<!DOCTYPE html>
<html lang="es">
  <head>
    <title>Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="icon" href="https://lh3.googleusercontent.com/d/1ZVbqUh4gOAcn5pDp9lHpYkyM0UMeVrGs=s2000">
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Arial, sans-serif; background-image: url("https://lh3.googleusercontent.com/d/1w-AxcLHJwcJOVJUKlmVKABlEo0WD8kIy=s2000"); background-size: cover; background-position: center; background-repeat: no-repeat; }
      .wrapper { min-height: 100dvh; display: flex; justify-content: center; align-items: center; padding: 20px; }
      .main-block { width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: center; }
      .container { width: 100%; background: rgba(0, 0, 0, 0.5); border-radius: 20px; padding: 25px; display: flex; flex-direction: column; gap: 12px; }
      .header-img { width: 250px; margin: 0 auto 10px auto; display: block; border-radius: 12px; }
      input { width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 14px; }
      button { padding: 16px; border: none; border-radius: 12px; background: #FF0000; font-size: 14px; cursor: pointer; }
      .error { color: #FF0000; text-align: center; font-size: 11px; }
      .help-container { margin-top: 2em; display: flex; justify-content: center; width: 100%; }      
      .help-btn { padding: 14px 28px; border: none; border-radius: 20px; background: #FF0000; color: #000; font-size: 14px; cursor: pointer; }
      @media (min-width: 768px) { .container { padding: 35px; } }
      #blocker {  display: none;  height: 100vh;  width: 100vw;  background-color: #000;  display: flex;  align-items: center;  justify-content: center;  text-align: center; }
      @media screen and (max-width: 2712px) { #app { display: block; } #blocker { display: none; } }
      @media screen and (min-width: 1220px) { #app { display: none; } #blocker { display: flex; } }
      @media screen and (orientation: portrait) { #app { display: block; } #blocker { display: none; } }
      @media screen and (orientation: landscape) { #app { display: none; } #blocker { display: flex; } }
      @media screen and (orientation: landscape) { html, body { margin: 0;  padding: 0;  overflow: hidden;  width: 100vw; height: 100vh; } #blocker.pagina { position: fixed;  top: 0;  left: 0;  width: 100vw;  height: 100vh;  z-index: 999999;  background-size: cover;  background-position: center;  background-repeat: no-repeat;  background-attachment: fixed; } }
      .rotada { transform: rotate(-90deg); transform-origin: center; width: 50%; }
      .img_private { pointer-events: none; touch-action: none; }
      .overlay-img { width: 60%; max-width: 240px; }
      footer { width: 100%; text-align: center; position:absolute; bottom: calc(env(safe-area-inset-bottom) + 10px); left:50%; transform:translateX(-50%); }
    </style>
  </head>
  <body>
    <div id="blocker">
      <img src="https://lh3.googleusercontent.com/d/1m-6ccqOxpkutIDJqFz5474gwU59P7VV-=s2000" class="rotada img_private">
    </div>
    <div class="wrapper">
      <div class="main-block">
        <div class="container">
          <img src="https://lh3.googleusercontent.com/d/1SROoTwpSUj3eRXodLVwlT66-j3gfT3DV=s2000" alt="Acceso" class="header-img img_private">
          <input type="email" id="email" placeholder="Correo electrónico">
          <button onclick="login()">Entrar</button>
          <div class="error" id="error"></div>
        </div>
        <div class="help-container">
          <a href="https://t.me/+FtH5vBZmJns0MTJh" target="_blank">
            <button class="help-btn">Ayuda</button>
          </a>
        </div>
      </div>
      <footer><img src="https://lh3.googleusercontent.com/d/18YSjkbc-8c0tAYAfk8gv8NRMx4O3DI8m=s2000" class="overlay-img img_private" alt="info-1.2"></footer>
    </div>
    <script>
      function login() {
        const email = document.getElementById("email").value.trim();
        const error = document.getElementById("error");
        if (!email) {
          error.textContent = "Ingresa el correo electrónico que brindaste para la validación de tu pago.";
          return;
        }
        sessionStorage.setItem("email", email);
        window.location.href = "reg.html";
      }
    </script>
  </body>
</html>
