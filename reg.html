        throw new Error("Acceso inválido");
      }
      setInterval(() => {
        if (window.outerWidth - window.innerWidth > 100) {
          document.body.innerHTML = "";
        }
      }, 1000);
      document.addEventListener("contextmenu", e => e.preventDefault());
      async function hashEmail(email) {
        const encoder = new TextEncoder();
        const data = encoder.encode(email);
        const hash = await crypto.subtle.digest("SHA-256", data);
        return Array.from(new Uint8Array(hash))
          .map(b => b.toString(16).padStart(2, "0"))

      }

      async function verificarIntegridad() {
        const contenido = document.documentElement.outerHTML;
        const encoder = new TextEncoder();
        const data = encoder.encode(contenido);
        const hash = await crypto.subtle.digest("SHA-256", data);    
        const hashHex = Array.from(new Uint8Array(hash))
          .map(b => b.toString(16).padStart(2, "0"))
          .join("");
        if (hashHex !== EXPECTED_HASH) {
          document.body.innerHTML = "";
        }
      }
      const delay = Math.random() * 2000 + 1000;
      setTimeout(async () => {
        await verificarIntegridad();
        const email = sessionStorage.getItem("email");
        if (!email || !email.includes("@")) {
          document.body.innerHTML = "";
          return;
        }
        const hashed = await hashEmail(email);
        const hashListaS = await Promise.all(listaS.map(hashEmail));
        const hashListaG = await Promise.all(listaG.map(hashEmail));
        const hashListaD = await Promise.all(listaD.map(hashEmail));
        let enS = hashListaS.includes(hashed);
        let enG = hashListaG.includes(hashed);
        let enD = hashListaD.includes(hashed);
        let total = [enS, enG, enD].filter(Boolean).length;
        if (total !== 1) {
          document.body.innerHTML = "";
          return;
        }
        const rutas = {
          S: "pagina_S.html",
          G: "pagina_G.html",
          D: "pagina_D.html"
        };
        if (enS) window.location.href = rutas.S;
        if (enG) window.location.href = rutas.G;
        if (enD) window.location.href = rutas.D;
      }, delay);
