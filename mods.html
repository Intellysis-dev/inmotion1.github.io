                  el.style.backgroundImage = `url('${url}')`;
                  el.dataset.originalBg = url;
                  el.dataset.bg = url;
                }
              }
              if (isGif) {
                el.style.backgroundImage = `url('${url}')`;
                el.dataset.originalBg = url;
                activeGif = el;
              }
            } else {
              if (isGif) {
                el.dataset.originalBg = url;
              }
            }
          });
        }, { root: null, rootMargin: "0px", threshold: 0.6 });
        paginas.forEach(p => observer.observe(p));
        let isPaused = false;
        const botonPause = document.getElementById("botonPause");
        const iconPause = botonPause.querySelector("i");
        botonPause.onclick = () => {
          if (!player) return;
          if (!isPaused) {
            player.pauseVideo();
            iconPause.className = "fa-solid fa-play";
            isPaused = true;
          } else {
            player.playVideo();
            iconPause.className = "fa-solid fa-pause";
            isPaused = false;
          }
        };
        const playlist12Videos = [
          "hBz-avUwksY",
          "4AfXqf2CE8A",
          "8TB4XgI23uo",
          "nIeGu4zZpiQ",
          "ZjM-CBv_4rc",
          "TWmOLEDW8Q8",
          "aELPikOUJFg",
          "D4c7ZG7r7QQ",
          "G7-dT9cTlDQ",
          "r9_oBKxn50Y"
        ];
        function reproducirPlaylistRandom() {
          if (!playlist12Videos.length) return;
          const randomIndex = Math.floor(Math.random() * playlist12Videos.length);
          const videoId = playlist12Videos[randomIndex];
          const iframe = document.getElementById("yt-random-player");
          iframe.src = "";
          setTimeout(() => {
            iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
          }, 100);
        }
        const prefijosBotonR = {
          1: "red",
          2: "black",
          3: "gray",
          4: "white",
          5: "pink",
          6: "blue",
          7: "orange",
          8: "green",
          9: "yellow"
        };
        let ultimoBotonR = null;
        function mostrarDivRandomActivo() {
          const paginaActiva = Array.from(document.querySelectorAll(".pagina-principal")).find(div => {
            return div.dataset.index && window.getComputedStyle(div).display !== "none";
          });
          if (!paginaActiva) return;
          const prefijo = prefijosBotonR[paginaActiva.dataset.index];
          if (!prefijo) return;
          const candidatos = Array.from(paginaActiva.querySelectorAll(`img[alt^="${prefijo}-"]`)).filter(img => {
            return /-[1-9][0-9]*$/.test(img.getAttribute("alt") || "");
          });
          if (!candidatos.length) return;
          const disponibles = candidatos.length > 1 ? candidatos.filter(img => img !== ultimoBotonR) : candidatos;
          const elegido = disponibles[Math.floor(Math.random() * disponibles.length)];
          const texto = elegido.closest(".texto-secundario");
          const pantalla = elegido.closest(".pagina-secundaria");
          if (!texto || !pantalla) return;
          paginaActiva.querySelectorAll(".texto-secundario").forEach(div => {
            div.style.display = "none";
          });
          const bg = pantalla.getAttribute("data-bg") || pantalla.dataset.originalBg;
          if (bg && !pantalla.style.backgroundImage) {
            pantalla.style.backgroundImage = `url('${bg}')`;
          }
          pantalla.style.visibility = "visible";
          texto.style.display = "block";
          pantalla.scrollIntoView({ behavior: "smooth", block: "start" });
          ultimoBotonR = elegido;
        }
        document.getElementById("botonR").addEventListener("click", mostrarDivRandomActivo);
        document.getElementById("botonYT").addEventListener("click", reproducirPlaylistRandom);
      })();

      (() => {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            const el = entry.target;
            if (entry.isIntersecting) {
              if (!el.style.backgroundImage) {
                const bg = el.getAttribute("data-bg");
                if (bg) el.style.backgroundImage = `url(${bg})`;
              }
            } else {
            }
          });
        }, {
          threshold: 0.6
        });
          document.querySelectorAll('.pagina-secundaria').forEach(el => {
            observer.observe(el);
          });
      })();
    </script>
    <script>
      (() => {
        const paginas = document.querySelectorAll('.pagina-secundaria');
          function virtualizar() {
            paginas.forEach((el, i) => {
              const rect = el.getBoundingClientRect();
              const visible = rect.top < window.innerHeight * 1.5 && rect.bottom > -window.innerHeight * 0.5;
              if (visible) {
                el.style.visibility = "visible";
              } else {
                el.style.visibility = "hidden";
              }
            });
          }
          document.querySelectorAll('.pagina-principal').forEach(container => {
            container.addEventListener('scroll', () => {
              requestAnimationFrame(virtualizar);
            });
          });
      })();
    </script>
    <script>
      (() => {
        function preloadNext() {
          document.querySelectorAll('.pagina-principal').forEach(container => {
            const pages = container.querySelectorAll('.pagina-secundaria');
            pages.forEach((el, i) => {
              const rect = el.getBoundingClientRect();
              if (rect.top >= 0 && rect.top < window.innerHeight) {
                const next = pages[i + 1];
                if (next && !next.style.backgroundImage) {
                  const bg = next.getAttribute("data-bg");
                  if (bg) next.style.backgroundImage = `url(${bg})`;
                }
              }
            });
          });
        }
      setInterval(preloadNext, 1200);
      })();
    </script>
