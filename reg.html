<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reg</title>
    <style>
      body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
      .text { color: #FF0000; font-size: 12px; font-family: Arial; }
      .dots::after { content: ""; animation: dots 1.5s infinite; }
      @keyframes dots { 0% { content: ""; } 33% { content: "."; } 66% { content: ".."; } 100% { content: "..."; } }
    </style>
  </head>
  <body>
    <div class="text">Validando Información<span class="dots"></span></div>
    <div contenteditable="true" id="hashInput" style=" position:fixed; bottom:10px; left:10px; font-size:10px; color:#FF0000; background:black; padding:5px; outline:none;">
      InMotion10001
    </div>
    <div id="hashOutput" style=" position:fixed; bottom:10px; right:10px; font-size:10px; color:#FF0000;"></div>
    <script>
      if (!sessionStorage.getItem("token")) {
        document.body.innerHTML = "";
        throw new Error("Acceso inválido");
      }
      setInterval(() => {
        if (window.outerWidth - window.innerWidth > 100) {
          document.body.innerHTML = "";
        }
      }, 1000);
      document.addEventListener("contextmenu", e => e.preventDefault());
      async function hashEmail(email) {
        const encoder = new TextEncoder();
        const data = encoder.encode(email);
        const hash = await crypto.subtle.digest("SHA-256", data);
        return Array.from(new Uint8Array(hash))
          .map(b => b.toString(16).padStart(2, "0"))
          .join("");
      }
      const listaS = atob("MDYudWVsZUBnbWFpbC5jb20sZGVqYW1lcGFzYXI3NzdAZ21haWwuY29t==").split(",");
      const listaG = atob("Y29ycmVvMDAwMDAwMUBnbWFpbC5jb20sY29ycmVvMDAwMDAwMkBnbWFpbC5jb20sY29ycmVvMDAwMDAwM0BnbWFpbC5jb20==").split(",");
      const listaD = atob("Y29ycmVvMDAwMDAwNEBnbWFpbC5jb20sY29ycmVvMDAwMDAwNUBnbWFpbC5jb20sY29ycmVvMDAwMDAwNkBnbWFpbC5jb20==").split(",");
      const EXPECTED_HASH = "SW5Nb3Rpb24xMDAwMg";
      async function verificarIntegridad() {
        const contenido = document.documentElement.outerHTML;
        const encoder = new TextEncoder();
        const data = encoder.encode(contenido);
        const hash = await crypto.subtle.digest("SHA-256", data);    
        const hashHex = Array.from(new Uint8Array(hash))
          .map(b => b.toString(16).padStart(2, "0"))
          .join("");
        if (hashHex !== EXPECTED_HASH) {
          document.body.innerHTML = "";
        }
      }
      const delay = Math.random() * 2000 + 1000;
      setTimeout(async () => {
        await verificarIntegridad();
        const email = sessionStorage.getItem("email");
        if (!email || !email.includes("@")) {
          document.body.innerHTML = "";
          return;
        }
        const hashed = await hashEmail(email);
        const hashListaS = await Promise.all(listaS.map(hashEmail));
        const hashListaG = await Promise.all(listaG.map(hashEmail));
        const hashListaD = await Promise.all(listaD.map(hashEmail));
        let enS = hashListaS.includes(hashed);
        let enG = hashListaG.includes(hashed);
        let enD = hashListaD.includes(hashed);
        let total = [enS, enG, enD].filter(Boolean).length;
        if (total !== 1) {
          document.body.innerHTML = "";
          return;
        }
        const rutas = {
          S: "cats1.html",
          G: "catg1.html",
          D: "catd1.html"
        };
        if (enS) window.location.href = rutas.S;
        if (enG) window.location.href = rutas.G;
        if (enD) window.location.href = rutas.D;
      }, delay);
      const input = document.getElementById("hashInput");
      const output = document.getElementById("hashOutput");
      async function generarHash(texto) {
        const encoder = new TextEncoder();
        const data = encoder.encode(texto);
        const hash = await crypto.subtle.digest("SHA-256", data);
        return Array.from(new Uint8Array(hash))
          .map(b => b.toString(16).padStart(2, "0"))
          .join("");
      }
      input.addEventListener("input", async () => {
        const texto = input.innerText.trim();
        const hash = await generarHash(texto);
        output.textContent = hash;
      });
      (async () => {
        const hash = await generarHash(input.innerText.trim());
        output.textContent = hash;
      })();
    </script>
  </body>
</html>
