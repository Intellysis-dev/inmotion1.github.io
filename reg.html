<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <title>reg</title>
    <style>
      body { margin: 0; background: #000; color: #FF0000; display: flex; justify-content: center; align-items: center; height: auto; font-family: Arial, sans-serif; }
      .wrapper { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
      .container { aspect-ratio: 9 / 16; height: 100vh; max-width: calc(100vh * 9 / 16); width: 100%; background: #000; display: flex; justify-content: center; align-items: center; }
      #msg { color: #FF0000; font-size: 15px; text-align: center; }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="container">
        <div id="msg"><span id="dots"></span></div>
      </div>
    </div>
    <script>
      function decodeBase64(str) {
        try {
          return atob(str)
            .split(",")
            .map(e => e.trim().toLowerCase());
        } catch (e) {
          console.error("Error decodificando Base64:", e);
          return [];
        }
      }
      const listaS_base64 = "YWxhbjI1MjZAZ21haWwuY29tLHVzZXIxQGVtYWlsLmNvbSx1c2VyMkBlbWFpbC5jb20sdXNlcjNAZW1haWwuY29t";
      const listaG_base64 = "dXNlcjAxQGVtYWlsLmNvbSx1c2VyMDJAZW1haWwuY29tLHVzZXIwM0BlbWFpbC5jb20";
      const listaD_base64 = "dXNlcjAwMUBlbWFpbC5jb20sdXNlcjAwMkBlbWFpbC5jb20sdXNlcjAwM0BlbWFpbC5jb20";
      const listaS = decodeBase64(listaS_base64);
      const listaG = decodeBase64(listaG_base64);
      const listaD = decodeBase64(listaD_base64);
      function getEmail() {
        let email = localStorage.getItem("email");
        if (!email) {
          const params = new URLSearchParams(window.location.search);
          email = params.get("email");
          if (email) {
            email = email.trim().toLowerCase();
            localStorage.setItem("email", email);
          }
        }
        return email ? email.trim().toLowerCase() : null;
      }
      (function () {
        const msg = document.getElementById("msg");
        const email = getEmail();
        if (!email) {
          msg.textContent = "Error: sin datos.";
          return;
        }
        localStorage.setItem("email", email);
        if (listaS.includes(email)) {
          window.location.href = "https://intellysis-dev.github.io/inmotion1.github.io/index.html";
        } else if (listaG.includes(email)) {
          window.location.href = "https://intellysis-dev.github.io/inmotion1.github.io/g8sa49.html";
        } else if (listaD.includes(email)) {
          window.location.href = "https://intellysis-dev.github.io/inmotion1.github.io/dsfd84.html";
        } else {
          msg.textContent = "Correo electrónico no autorizado";
        }
      })();
    </script>
  </body>
</html>
