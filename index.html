<!DOCTYPE html>
<html lang="es">
  <head>
    <title>InMotion I</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="icon" href="https://lh3.googleusercontent.com/d/1ZVbqUh4gOAcn5pDp9lHpYkyM0UMeVrGs=s2000">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; font-family: Arial, sans-serif; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      .main-wrapper { width: 100%; height: 100dvh; position: relative; }
      #blocker { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 999999; align-items: center; justify-content: center; text-align: center; }
      .rotada { transform: rotate(-90deg); transform-origin: center; width: 50%; }
      @media screen and (orientation: landscape) { #blocker { display: flex; } }
      .p1 { width: 100%; height: 100%; background: url("https://lh3.googleusercontent.com/d/1w-AxcLHJwcJOVJUKlmVKABlEo0WD8kIy=s3000") center/cover no-repeat; color: #FFF; position: absolute; top: 0; left: 0; opacity: 1; transition: opacity 0.6s ease; z-index: 2; }
      nav { position: absolute; top: 1em; right: 1em; display: flex; gap: 1em; font-size: 0.7em; }
      nav a { background: rgba(0,0,0,0.5); padding: 0.5em 0.8em; border-radius: 0.5em; text-decoration: none; color: #FFF; }
      .overlay { position: absolute; top: 42%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.45); padding: 2em; border-radius: 1em; display: flex; flex-direction: column; align-items: center; gap: 1.5em; }
      button { padding: 1em 2em; font-size: 0.7em; border-radius: 0.5em; border: none; background: #FF0000; color: #FFF; }
      .footer { width: 100%; position: absolute; bottom: 1em; left: 50%; transform: translateX(-50%); font-size: 0.5em; text-align: center; opacity: 0.8; color: #FFF; }
      .p2 { width: 100%; height: 100%; position: absolute; top: 0; left: 0; opacity: 0; transition: opacity 0.6s ease; z-index: 1; pointer-events: none; }
      .p2.active { opacity: 1; pointer-events: auto; }
      .p1.fade-out { opacity: 0; }
      .slider { display: flex; height: 100%; transition: transform 0.4s ease; }
      .screen { min-width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
      .membership { flex-direction: column; padding: 30px; color: #FFF; text-align: center; }
      .s, .g, .d { background:url('https://lh3.googleusercontent.com/d/1w-AxcLHJwcJOVJUKlmVKABlEo0WD8kIy=s2000') center/cover no-repeat; }
      .card { width: 100%; padding: 30px; border-radius: 20px; background: rgba(0,0,0,0.25); backdrop-filter: blur(8px); }
      .button-link { display: block; margin: 5% auto 0; padding: 14px; width: 75%; font-size: 0.7em; text-decoration: none; background: #FF0000; color: #FFF; font-weight: bold; border-radius: 12px; }
      .home-btn { position: absolute; bottom: calc(env(safe-area-inset-bottom, 0px) + 20px); right: 20px; width: 60px; height: 60px; border-radius: 50%; background: #FF0000; color: #FFF; border: none; font-weight: bold; font-size: 1.2em; display: flex; align-items: center; justify-content: center; padding: 0; z-index: 10; }
      #floatingMsg { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #000; color: #FF0000; padding: 10px 20px; border-radius: 10px; font-size: 0.5em; z-index: 999999; display: none; text-align: center; align-items: center; justify-content: center; }
      .updateBox { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #FF0000; color: #000; padding: 20px 25px; border-radius: 10px; width: 70%; max-width: 320px; font-size: 0.6em; text-align: center; z-index: 9999999; }
      .updateBox .closeUpdate { position: absolute; top: 6px; right: 10px; font-weight: bold; cursor: pointer; font-size: 1em; }
      .overlay-img { width: 60%; max-width: 240px; }
      .img_private { pointer-events: none; touch-action: none; }
      footer { width: 100%; text-align: center; position:absolute; bottom: calc(env(safe-area-inset-bottom) + 10px); left:50%; transform:translateX(-50%); }
      .w100 { width: 100%; }
      .w50 { width: 50%; }
      .w12e { width: 12em; }
      .btn1 { width: 12em; border-radius: 12px; }
    </style>
  </head>
  <body>
    <div id="updateNotice" class="updateBox">
      <div class="closeUpdate" id="closeUpdate"><i class="fa-solid fa-xmark"></i></div>
      <img src="https://lh3.googleusercontent.com/d/1MMoaSxwNBnZVA_BaSZdcJJg3j28cYZar=s2000" class="w100 img_private">
    </div>
    <div id="floatingMsg">Aún no disponible.</div>
    <div id="blocker">
      <img src="https://lh3.googleusercontent.com/d/1m-6ccqOxpkutIDJqFz5474gwU59P7VV-=s2000" class="rotada img_private">
    </div>
    <div class="main-wrapper">
      <div class="p1" id="p1">
        <nav>
          <a href="https://intellysis-dev.github.io/inmotion1.github.io/info.html" target="_blank">Info</a>
          <a href="https://intellysis-dev.github.io/inmotion1.github.io/demo.html" target="_blank">Demo</a>
          <a href="https://intellysis-dev.github.io/inmotion1.github.io/teasers.html" target="_blank">Teasers</a>
          <a href="https://intellysis-dev.github.io/inmotion1.github.io/contact.html" target="_blank">Contact</a>
          <a href="https://intellysis-dev.github.io/inmotion1.github.io/faq.html" target="_blank">FAQ</a>
          <a href="https://intellysis-dev.github.io/inmotion1.github.io/tc.html" target="_blank">T&amp;C</a>
        </nav>
        <div class="overlay">
          <img src="https://lh3.googleusercontent.com/d/1SROoTwpSUj3eRXodLVwlT66-j3gfT3DV=s3000" class="w12e img_private">
          <button id="startBtn" class="btn1">Seleccionar plan</button>
        </div>
        <footer><img src="https://lh3.googleusercontent.com/d/18YSjkbc-8c0tAYAfk8gv8NRMx4O3DI8m=s2000" class="overlay-img img_private" alt="info-1.2"></footer>
      </div>
      <div class="p2" id="p2">
        <div class="slider" id="slider">
          <div class="screen membership s">
            <div class="card">
              <img src="https://lh3.googleusercontent.com/d/1trFb2zEA90ceTHEh3lDVT5EhbG-vk-L5=s2000" class="w100 img_private">
              <a class="button-link" s="0" data-msg="Me interesa la categoría S, plan 3 x $40">
                <img src="https://lh3.googleusercontent.com/d/1jYGETvrlWTM8tVxVM-uVKgQVh_5KlmkF=s2000" class="w50 img_private">
              </a>
              <a class="button-link" s="1" data-msg="Me interesa la categoría S, plan 7 x $60">
                <img src="https://lh3.googleusercontent.com/d/1LNUTpj_L7XLYQ1_hf3bwrE3pI8fRoQYd=s2000" class="w50 img_private">
              </a>
              <a class="button-link" s="1" data-msg="Me interesa la categoría S, plan 15 x $100">
                <img src="https://lh3.googleusercontent.com/d/1qR6xvfyRLRJtHDcc2EnLtm057KsiQQDZ=s2000" class="w50 img_private">
              </a>
            </div>
            <button class="home-btn"><i class="fa-solid fa-house"></i></button>
          </div>
          <div class="screen membership g">
            <div class="card">
              <img src="https://lh3.googleusercontent.com/d/1KhTDlSiVp26if-x8PCUpWUauu4MECojU=s2000" class="w100 img_private">
              <a class="button-link" s="0" data-msg="Me interesa la categoría G, plan 3 x $100">
                <img src="https://lh3.googleusercontent.com/d/1NzRJhnzFW9Wp3eE9gj5L091iVFaWdr_l=s2000" class="w50 img_private">
              </a>
              <a class="button-link" s="1" data-msg="Me interesa la categoría G, plan 7 x $150">
                <img src="https://lh3.googleusercontent.com/d/1y4y8_09mT_VNr9c5oIbqVYDHYMOwl6Rs=s2000" class="w50 img_private">
              </a>
              <a class="button-link" s="1" data-msg="Me interesa la categoría G, plan 15 x $250">
                <img src="https://lh3.googleusercontent.com/d/1XSCzUl6wqQQQJo51oO4NSePIh-WXW-Ni=s2000" class="w50 img_private">
              </a>
            </div>
            <button class="home-btn"><i class="fa-solid fa-house"></i></button>
          </div>
          <div class="screen membership d">
            <div class="card">
              <img src="https://lh3.googleusercontent.com/d/1LBU_q2eUH5H2WtPyoJCWb9344DSb016I=s2000" class="w100 img_private">
              <a class="button-link" s="0" data-msg="Me interesa la categoría D, plan 3 x $150">
                <img src="https://lh3.googleusercontent.com/d/15RMspVs4fdfe4dlU5c9cPrXaoYyCkaq-=s2000" class="w50 img_private">
              </a>
              <a class="button-link" s="1" data-msg="Me interesa la categoría D, plan 7 x $250">
                <img src="https://lh3.googleusercontent.com/d/1oUsc6VgUQ5uMPtm9kj4DQn-lNB88ZMWo=s2000" class="w50 img_private">
              </a>
              <a class="button-link" s="1" data-msg="Me interesa la categoría D, plan 15 x $350">
                <img src="https://lh3.googleusercontent.com/d/1bkTRXDjtC8g3Lp7Us3rwdg1-2W42BfKG=s2000" class="w50 img_private">
              </a>
            </div>
            <button class="home-btn"><i class="fa-solid fa-house"></i></button>
          </div>
        </div>
        <footer><img src="https://lh3.googleusercontent.com/d/18YSjkbc-8c0tAYAfk8gv8NRMx4O3DI8m=s2000" class="overlay-img img_private" alt="info-1.2"></footer>
      </div>
    </div>
    <script>
      const p1 = document.getElementById("p1");
      const p2 = document.getElementById("p2");
      const slider=document.getElementById("slider");
      const floating=document.getElementById("floatingMsg");
      let current=0;
      const total=slider.children.length;
      document.getElementById("startBtn").addEventListener("click", ()=>{
        requestAnimationFrame(()=>{
          p2.classList.add("active");
          p1.classList.add("fade-out");
          setTimeout(()=>{ p1.style.display="none"; },400);
        });
      });
      document.querySelectorAll(".home-btn").forEach(btn=>{
      btn.addEventListener("click", ()=>{
          p2.classList.remove("active");
          setTimeout(()=>{
              p1.style.display="block";
              current = 0;
              slider.style.transform = `translateX(0%)`;
              void p1.offsetWidth;
              p1.classList.remove("fade-out");
          },600);
      });
      });
      window.addEventListener("resize", ()=>{
        slider.style.transform=`translateX(-${current*100}%)`;
      });
      function showMsg(){
        floating.style.display="block";
        setTimeout(()=>{
          floating.style.display="none";
        },5000);
      }
      document.querySelectorAll(".button-link").forEach(btn=>{
      btn.addEventListener("click",(e)=>{
      e.preventDefault();
      const modo=btn.getAttribute("s");
      const mensaje=btn.dataset.msg;
      if(modo==="1"){
        showMsg();
        return;
      }
      const telefono="525577984626";
      const url="https://t.me/"+telefono+"?text="+encodeURIComponent(mensaje);
      window.open(url,"_blank");
      });
      });
      let startX=0;
      document.addEventListener("touchstart",e=>{
      startX=e.touches[0].clientX;
      },{passive:true});
      document.addEventListener("touchend",e=>{
      const endX=e.changedTouches[0].clientX;
      const threshold=60;
      if(startX-endX>threshold&&current<total-1){current++;}
      else if(endX-startX>threshold&&current>0){current--;}
      slider.style.transform=`translateX(-${current*100}%)`;
      },{passive:true});
      const updateNotice=document.getElementById("updateNotice");
      const closeUpdate=document.getElementById("closeUpdate");
      
      closeUpdate.addEventListener("click",()=>{
        updateNotice.remove();
      });
    </script>
  </body>
</html>
